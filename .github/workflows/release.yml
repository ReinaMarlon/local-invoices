name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build JAR
        run: mvn -B clean package

      - name: Create Runtime Image
        run: mvn -B -DskipTests javafx:jlink

      - name: Install WiX
        shell: pwsh
        run: |
          choco install wixtoolset -y
          "C:\Program Files (x86)\WiX Toolset v3.14\bin" | Out-File -Append $env:GITHUB_PATH

      - name: Create EXE
        shell: pwsh
        run: |
          jpackage `
            --type exe `
            --name "Local Invoices" `
            --vendor "ReinaMarlon" `
            --app-version 1.0.0 `
            --description "Native desktop app for local invoice and receipt management" `
            --runtime-image "target/LocalInvoices" `
            --module "io.github.reinamarlon.localinvoices/io.github.reinamarlon.localinvoices.LocalInvoicesApp" `
            --icon "src/main/resources/io/github/reinamarlon/localinvoices/images/icon.ico" `
            --java-options "--enable-native-access=javafx.graphics,org.xerial.sqlitejdbc" `
            --win-shortcut `
            --win-menu `
            --dest installer

      - name: Create MSI
        shell: pwsh
        run: |
          jpackage `
            --type msi `
            --name "Local Invoices" `
            --vendor "ReinaMarlon" `
            --app-version 1.0.0 `
            --description "Native desktop app for local invoice and receipt management" `
            --runtime-image "target/LocalInvoices" `
            --module "io.github.reinamarlon.localinvoices/io.github.reinamarlon.localinvoices.LocalInvoicesApp" `
            --icon "src/main/resources/io/github/reinamarlon/localinvoices/images/icon.ico" `
            --java-options "--enable-native-access=javafx.graphics,org.xerial.sqlitejdbc" `
            --win-shortcut `
            --win-menu `
            --dest installer

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/*.jar
            installer/*.exe
            installer/*.msi
