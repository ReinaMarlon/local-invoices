name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build
        run: mvn clean package

      - name: Create Release
        uses: softprops/action-gh-release@v2

        with:
          files: |
            target/*.jar
            installer/*.exe
            installer/*.msi